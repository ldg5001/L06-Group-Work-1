<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TRITH | Subscriber Registration</title>

  <!--Bootstrap CSS-->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" ...>
<link rel="stylesheet" href="css/style.css">
</head>

<body>
  <!--Navigation Bar-->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom">
    <div class="container">
      <a class="navbar-brand" href="index.html">TRITH</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navmenu">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navmenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="register.html">Subscribe</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <!--Image on the top left & Registration form in the right-->
    <section class="border rounded-4 overflow-hidden shadow-lg">
      <div class="row g-0">

        <!--Image on the top left-->
        <div class="col-lg-6">
          <div class="h-100">
            <img
              src="https://images.unsplash.com/photo-1436491865332-7a61a109cc05?q=80&w=1174&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
              alt="Plane background" class="w-100 h-100 object-fit-cover" style="min-height: 420px;">
          </div>
        </div>

        <!--Registration form-->
        <div class="col-lg-6 p-4 p-md-5 bg-white">
          <h1 class="fw-bold mb-2 text-primary">Join TRITH</h1>
          <p class="text-muted mb-4">Subscribe to see our travel deals and updates!</p>

          <!--JS validation form-->
          <div id="messageArea" class="mb-3"></div>

          <!--Required Fields-->
          <form id="subscriberForm" novalidate>
            <div class="mb-3">
              <label class="form-label" for="name">Name *</label>
              <input class="form-control" type="text" id="name" required>
              <div class="invalid-feedback">Name is required.</div>
            </div>

            <div class="mb-3">
              <label class="form-label" for="email">Email *</label>
              <input class="form-control" type="email" id="email" required>
              <div class="invalid-feedback">Invalid Email! Please try again.</div>
            </div>

            <div class="mb-3">
              <label class="form-label" for="age">Age *</label>
              <input class="form-control" type="number" id="age" required>
              <div class="invalid-feedback">Age is required.</div>
            </div>

            <div class="mb-3">
              <label class="form-label" for="affiliation">Country/Affiliation *</label>
              <input class="form-control" type="text" id="affiliation" required>
              <div class="invalid-feedback">Country/Affiliation is required.</div>
            </div>

            <div class="mb-3">
              <label class="form-label" for="phone">Phone Number (optional)</label>
              <input class="form-control" type="tel" id="phone">
            </div>

            <div class="d-grid gap-2">
              <button class="btn btn-primary" type="submit">Finish</button>
            </div>
          </form>
        </div>

      </div>
    </section>

    <!--Bottom table display-->
    <section class="mt-5">
      <h2 class="h4 fw-bold mb-3">Subscriber Directory</h2>
      <div class="table-responsive">
        <table class="table table-bordered align-middle">
          <thead class="table-light">
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Age</th>
              <th>Country/Affiliation</th>
              <th>Phone</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="subscriberTbody">
            <!--JS-->
          </tbody>
        </table>
      </div>
    </section>

  </main>

  <!--Bootstrap JS-->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

  <!--Java script-->
  <script src="js/app.js"></script>
</body>

</html>
